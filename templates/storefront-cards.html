<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iliadesign — Selected Products</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://gumroad.com/js/gumroad.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f4f1eb;
            color: #2c2c2c;
            padding: 32px 24px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            max-width: 960px;
            margin: 0 auto;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e2ddd4;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.06);
        }

        .card-img {
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-bottom: 1px solid #e2ddd4;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: 16px;
            flex: 1;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 6px;
        }

        .card-price {
            font-size: 1rem;
            font-weight: 600;
            color: #4a7c59;
        }

        .card-footer {
            padding: 0 16px 16px;
        }

        .buy-btn {
            display: block !important;
            width: 100% !important;
            padding: 12px !important;
            background: #4a7c59 !important;
            color: #fff !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 0.9rem !important;
            font-weight: 600 !important;
            border: none !important;
            border-radius: 8px !important;
            text-align: center !important;
            text-decoration: none !important;
            cursor: pointer;
            transition: background 0.2s ease !important;
        }

        .buy-btn:hover {
            background: #3b6347 !important;
        }

        .buy-btn::before {
            display: none !important;
        }

        @media (max-width: 640px) {
            body { padding: 16px; }
            .products { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <section class="products">
        <div class="card">
            <div class="card-img">
                <img src="https://public-files.gumroad.com/m0n0u1prvsmq6fvhu6qypsymiqta"
                     alt="Agriculture & Farming Line Icons Set">
            </div>
            <div class="card-body">
                <div class="card-title">Agriculture & Farming Line Icons Set</div>
                <div class="card-price">$15</div>
            </div>
            <div class="card-footer">
                <a class="gumroad-button buy-btn" href="https://iliadesign.gumroad.com/l/FarmLineIconsSet">Purchase</a>
            </div>
        </div>

        <div class="card">
            <div class="card-img">
                <img src="https://public-files.gumroad.com/akh4fr55cbtotafku2n8sxfa9ijm"
                     alt="Farming Plants Life Cycle from Seed to Harvest">
            </div>
            <div class="card-body">
                <div class="card-title">Farming Plants Life Cycle from Seed to Harvest</div>
                <div class="card-price">$39</div>
            </div>
            <div class="card-footer">
                <a class="gumroad-button buy-btn" href="https://iliadesign.gumroad.com/l/oipiv">Purchase</a>
            </div>
        </div>

        <div class="card">
            <div class="card-img">
                <img src="https://public-files.gumroad.com/hfurrmg6drigqahafmda6vu0op61"
                     alt="30 Flower Development Phases for Garden Planning">
            </div>
            <div class="card-body">
                <div class="card-title">30 Flower Development Phases for Garden Planning</div>
                <div class="card-price">$10</div>
            </div>
            <div class="card-footer">
                <a class="gumroad-button buy-btn" href="https://iliadesign.gumroad.com/l/FlowerGrowth">Purchase</a>
            </div>
        </div>
    </section>
</body>
</html>
