<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iliadesign — Botanical Illustrations & Digital Assets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f1eb;
            --text: #2c2c2c;
            --text-muted: #7a7568;
            --accent: #4a7c59;
            --border: #e2ddd4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 15% 20%, rgba(74, 124, 89, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 85% 75%, rgba(74, 124, 89, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 24px 80px;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 56px;
            animation: fadeUp 0.8s ease-out;
        }

        header .brand {
            font-family: 'DM Serif Display', serif;
            font-size: 2.4rem;
            color: var(--accent);
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        header .tagline {
            font-size: 1.05rem;
            color: var(--text-muted);
            font-weight: 400;
            max-width: 420px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .divider {
            width: 48px;
            height: 2px;
            background: var(--accent);
            margin: 24px auto 0;
            opacity: 0.4;
        }

        /* Products grid */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
        }

        .product-wrapper {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 24px;
            overflow: hidden;
            transition: transform 0.35s ease, box-shadow 0.35s ease;
            animation: fadeUp 0.8s ease-out both;
        }

        .product-wrapper:nth-child(1) { animation-delay: 0.1s; }
        .product-wrapper:nth-child(2) { animation-delay: 0.25s; }
        .product-wrapper:nth-child(3) { animation-delay: 0.4s; }

        .product-wrapper:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(74, 124, 89, 0.08), 0 6px 12px rgba(0,0,0,0.03);
        }

        /* Gumroad embed overrides */
        .gumroad-product-component {
            width: 100% !important;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 72px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
            animation: fadeUp 0.8s ease-out 0.5s both;
        }

        footer p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 40px 16px 60px;
            }
            header .brand {
                font-size: 1.8rem;
            }
            .products {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            .product-wrapper {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">iliadesign</div>
            <p class="tagline">Botanical illustrations & digital assets for designers, farmers, and nature lovers</p>
            <div class="divider"></div>
        </header>

        <section class="products">
            <div class="product-wrapper">
                <div class="gumroad-product-component" data-gumroad-product-id="FarmLineIconsSet"></div>
            </div>

            <div class="product-wrapper">
                <div class="gumroad-product-component" data-gumroad-product-id="oipiv"></div>
            </div>

            <div class="product-wrapper">
                <div class="gumroad-product-component" data-gumroad-product-id="FlowerGrowth"></div>
            </div>
        </section>

        <footer>
            <p>© 2025 iliadesign · <a href="https://iliadesign.gumroad.com" target="_blank">Full Store on Gumroad</a></p>
        </footer>
    </div>

    <script src="https://gumroad.com/js/gumroad-embed.js"></script>
</body>
</html>
